name: Build Xiaomi SM8250 Kernel
on:
  workflow_dispatch:
    inputs:
      device:
        description: '目标设备'
        required: true
        default: 'lmi'
      enable_ksu:
        description: '开启 KernelSU'
        required: true
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出内核源码
        uses: actions/checkout@v4
        with:
          repository: AstideLabs/android_kernel_xiaomi_sm8250
          ref: android16-aptusitu-new
          fetch-depth: 1

      - name: 安装编译依赖
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git git-lfs lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev \
            lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: 内核编译（内嵌完整脚本）
        env:
          TARGET_DEVICE: ${{ github.event.inputs.device }}
          ENABLE_KSU: ${{ github.event.inputs.enable_ksu }}
        run: |
          set -e
          HOME="/home/runner"
          WORKSPACE="$GITHUB_WORKSPACE"
          cd "${WORKSPACE}"

          # 基础变量
          GIT_COMMIT_ID=$(git rev-parse --short=8 HEAD)
          TOOLCHAIN_PATH="${WORKSPACE}/clang-r498229/bin"

          # 替换失效工具链：使用 Google 官方 Clang
          echo "===== 准备 Clang 工具链 ====="
          if [ ! -d "${WORKSPACE}/clang-r498229" ]; then
            wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
            unzip -q android-ndk-r26c-linux.zip
            mv android-ndk-r26c/toolchains/llvm/prebuilt/linux-x86_64 clang-r498229
          fi

          export PATH="${TOOLCHAIN_PATH}:${PATH}"

          # 编译参数
          MAKE_ARGS="ARCH=arm64 SUBARCH=arm64 O=out CC=clang \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          CLANG_TRIPLE=aarch64-linux-gnu-"

          # 检查 defconfig
          if [ ! -f "arch/arm64/configs/${TARGET_DEVICE}_defconfig" ]; then
            echo "错误：未找到设备 ${TARGET_DEVICE}"
            ls arch/arm64/configs/*_defconfig
            exit 1
          fi

          # KSU 开关
          KSU_ENABLE=0
          KSU_ZIP_STR="NoKernelSU"
          if [ "${ENABLE_KSU}" = "true" ]; then
            KSU_ENABLE=1
            KSU_ZIP_STR="KernelSU_SuSFS"
          fi

          # 清理
          rm -rf out/ anykernel/
          git clone https://github.com/AstideLabs/AnyKernel3 --depth=1 anykernel

          # DTS 适配（保留原逻辑）
          dts_source=arch/arm64/boot/dts/vendor/qcom
          cp -a ${dts_source} .dts.bak

          sed -i 's/<154>/<1537>/g' ${dts_source}/dsi-panel-j1s* 2>/dev/null || :
          sed -i 's/<154>/<1537>/g' ${dts_source}/dsi-panel-j2* 2>/dev/null || :
          sed -i 's/<155>/<1544>/g' ${dts_source}/dsi-panel-j3s-37-02-0a-dsc-video.dtsi 2>/dev/null || :
          sed -i 's/<70>/<695>/g' ${dts_source}/dsi-panel-j11-38-08-0a-fhd-cmd.dtsi 2>/dev/null || :
          sed -i 's/<71>/<710>/g' ${dts_source}/dsi-panel-j1s* 2>/dev/null || :

          sed -i 's/\/\/ mi,mdss-dsi-pan-enable-smart-fps/mi,mdss-dsi-pan-enable-smart-fps/g' ${dts_source}/dsi-panel* 2>/dev/null || :
          sed -i 's/qcom,mdss-dsi-qsync-min-refresh-rate/\/\/qcom,mdss-dsi-qsync-min-refresh-rate/g' ${dts_source}/dsi-panel* 2>/dev/null || :

          # 生成配置
          make ${MAKE_ARGS} ${TARGET_DEVICE}_defconfig

          # KSU 配置
          if [ ${KSU_ENABLE} -eq 1 ]; then
            scripts/config --file out/.config \
              -e KSU -e THREAD_INFO_IN_TASK -e KSU_SUSFS -e KPM
          else
            scripts/config --file out/.config -d KSU
          fi

          # 内核配置
          scripts/config --file out/.config \
            --set-str STATIC_USERMODEHELPER_PATH /system/bin/micd \
            -e PERF_CRITICAL_RT_TASK -e SF_BINDER -e OVERLAY_FS -d DEBUG_FS \
            -e MIGT -e MIHW -e BINDER_OPT -e XIAOMI_MIUI -d LTO_CLANG

          # 开始编译
          make ${MAKE_ARGS} -j$(nproc)

          # 检查编译结果
          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "编译失败"
            exit 1
          fi

          # 合成 dtb
          find out/arch/arm64/boot/dts -name '*.dtb' -exec cat {} + > out/arch/arm64/boot/dtb

          # 恢复 DTS
          rm -rf ${dts_source}
          mv .dts.bak ${dts_source}

          # 打包
          mkdir -p anykernel/kernels/miui/
          cp out/arch/arm64/boot/Image anykernel/kernels/miui/
          cp out/arch/arm64/boot/dtb anykernel/kernels/miui/
          cp out/arch/arm64/boot/dtbo.img anykernel/kernels/miui/ 2>/dev/null || :

          cd anykernel
          ZIP_FILENAME="APTKernel_MIUI_${TARGET_DEVICE}_${KSU_ZIP_STR}_$(date +'%Y%m%d_%H%M%S')_${GIT_COMMIT_ID}.zip"
          zip -r9 "${ZIP_FILENAME}" ./* -x ".git/*" ".gitignore"
          mv "${ZIP_FILENAME}" ../
          cd -

          mkdir -p release
          mv "${ZIP_FILENAME}" release/
          echo "✅ 编译完成：release/${ZIP_FILENAME}"

      - name: 上传刷机包
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.event.inputs.device }}
          path: release/*.zip
