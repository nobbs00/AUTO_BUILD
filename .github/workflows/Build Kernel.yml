name: Build Xiaomi SM8250 Kernel
on:
  workflow_dispatch:
    inputs:
      device:
        description: '目标设备（支持 lmi / umi / cmi / cas / thyme）'
        required: true
        default: 'cmi'
      enable_ksu:
        description: '开启 KernelSU'
        required: true
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: AstideLabs/android_kernel_xiaomi_sm8250
          ref: android16-aptusitu-new
          fetch-depth: 1

      - name: Install dependencies & cross toolchains
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq bc bison build-essential ccache curl flex git-lfs \
            g++-multilib gcc-multilib lib32ncurses5-dev lib32readline-dev lib32z1-dev \
            liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev lzop zip python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

      - name: Build kernel inline
        env:
          TARGET_DEVICE: ${{ github.event.inputs.device }}
          ENABLE_KSU: ${{ github.event.inputs.enable_ksu }}
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          GIT_COMMIT=$(git rev-parse --short=8 HEAD)

          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export O=out

          MAKE_ARGS="ARCH=arm64 SUBARCH=arm64 O=out CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CLANG_TRIPLE=aarch64-linux-gnu-"

          if [ ! -f "arch/arm64/configs/${TARGET_DEVICE}_defconfig" ]; then
            echo "ERROR: No defconfig for $TARGET_DEVICE"
            ls arch/arm64/configs/*_defconfig
            exit 1
          fi

          KSU_ENABLE=0
          KSU_STR="NoKernelSU"
          if [ "$ENABLE_KSU" = "true" ]; then
            KSU_ENABLE=1
            KSU_STR="KernelSU_SuSFS"
          fi

          rm -rf out anykernel
          git clone https://github.com/AstideLabs/AnyKernel3 --depth=1 anykernel

          dts_source=arch/arm64/boot/dts/vendor/qcom
          cp -a "$dts_source" .dts.bak

          sed -i 's/<154>/<1537>/g' ${dts_source}/dsi-panel-j1s* 2>/dev/null || true
          sed -i 's/<154>/<1537>/g' ${dts_source}/dsi-panel-j2* 2>/dev/null || true
          sed -i 's/<155>/<1544>/g' ${dts_source}/dsi-panel-j3s-37-02-0a-dsc-video.dtsi 2>/dev/null || true
          sed -i 's/<70>/<695>/g' ${dts_source}/dsi-panel-j11-38-08-0a-fhd-cmd.dtsi 2>/dev/null || true
          sed -i 's/<71>/<710>/g' ${dts_source}/dsi-panel-j1s* 2>/dev/null || true

          sed -i 's/\/\/ mi,mdss-dsi-pan-enable-smart-fps/mi,mdss-dsi-pan-enable-smart-fps/g' ${dts_source}/dsi-panel* 2>/dev/null || true
          sed -i 's/qcom,mdss-dsi-qsync-min-refresh-rate/\/\/qcom,mdss-dsi-qsync-min-refresh-rate/g' ${dts_source}/dsi-panel* 2>/dev/null || true

          make $MAKE_ARGS ${TARGET_DEVICE}_defconfig

          if [ $KSU_ENABLE -eq 1 ]; then
            scripts/config --file out/.config \
            -e KSU -e THREAD_INFO_IN_TASK -e KSU_SUSFS -e KPM
          else
            scripts/config --file out/.config -d KSU
          fi

          scripts/config --file out/.config \
          --set-str STATIC_USERMODEHELPER_PATH /system/bin/micd \
          -e PERF_CRITICAL_RT_TASK -e SF_BINDER -e OVERLAY_FS -d DEBUG_FS \
          -e MIGT -e MIHW -e BINDER_OPT -e XIAOMI_MIUI -d LTO_CLANG

          make $MAKE_ARGS -j$(nproc)

          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "Build failed!"
            exit 1
          fi

          find out/arch/arm64/boot/dts -name '*.dtb' -exec cat {} + > out/arch/arm64/boot/dtb

          rm -rf "$dts_source"
          mv .dts.bak "$dts_source"

          mkdir -p anykernel/kernels/miui
          cp out/arch/arm64/boot/Image anykernel/kernels/miui/
          cp out/arch/arm64/boot/dtb anykernel/kernels/miui/
          cp out/arch/arm64/boot/dtbo.img anykernel/kernels/miui/ 2>/dev/null || true

          cd anykernel
          ZIP_NAME="APTKernel_MIUI_${TARGET_DEVICE}_${KSU_STR}_$(date +%Y%m%d_%H%M%S)_${GIT_COMMIT}.zip"
          zip -r9 "$ZIP_NAME" ./* -x .git/**\* .gitignore
          mv "$ZIP_NAME" ../
          cd ..

          mkdir -p release
          mv "$ZIP_NAME" release/
          echo "✅ 编译完成：release/$ZIP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.event.inputs.device }}
          path: release/*.zip
