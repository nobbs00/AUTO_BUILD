name: Mi10Pro-cmi Kernel Build (MIUI单包·省电优化版)
on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备代号'
        required: true
        default: 'cmi'
        type: choice
        options:
          - cmi
          - umi
          - lmi
      ksu:
        description: '是否启用SukiSU'
        required: true
        default: 'noks'
        type: choice
        options:
          - noks
          - ksu

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      DEVICE: ${{ inputs.device }}
      KSU: ${{ inputs.ksu }}
      KERNEL_DIR: ${{ github.workspace }}/kernel_xiaomi_sm8250_mod
      CLANG_VER: 20210522
      ARCH: arm64
      SUBARCH: arm64

    steps:
      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential git curl wget bison flex zip bc cpio libssl-dev \
            python3 python-is-python3 libelf-dev dwarves rsync lz4 gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu ccache

      - name: Clone kernel source
        run: |
          git clone https://github.com/liyafe1997/kernel_xiaomi_sm8250_mod.git "$KERNEL_DIR"
          cd "$KERNEL_DIR"
          git checkout android15-lineage22-mod

      - name: Download proton-clang 20210522
        run: |
          mkdir -p "$HOME/proton-clang"
          cd "$HOME/proton-clang"
          wget -q https://github.com/kdrag0n/proton-clang/archive/refs/tags/${CLANG_VER}.zip
          unzip -q ${CLANG_VER}.zip
          echo "TOOLCHAIN_PATH=$HOME/proton-clang/proton-clang-${CLANG_VER}/bin" >> "$GITHUB_ENV"
          echo "$HOME/proton-clang/proton-clang-${CLANG_VER}/bin" >> "$GITHUB_PATH"

      - name: Build MIUI Kernel
        run: |
          cd "$KERNEL_DIR"
          export PATH="$TOOLCHAIN_PATH:$PATH"
          GIT_COMMIT_ID=$(git rev-parse --short=8 HEAD)
          DATE=$(date +%Y%m%d_%H%M%S)

          if [ "$KSU" = "ksu" ]; then
            KSU_ENABLE=1
            KSU_ZIP_STR=SukiSU-SUSFS
          else
            KSU_ENABLE=0
            KSU_ZIP_STR=NoKernelSU
          fi

          MAKE_ARGS="ARCH=arm64 SUBARCH=arm64 O=out CC=clang \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
          CLANG_TRIPLE=a64-linux-gnu-"

          export CCACHE_DIR="$HOME/.cache/ccache_mikernel"
          mkdir -p "$CCACHE_DIR"
          ccache -M 10G

          rm -rf anykernel out
          git clone https://github.com/liyafe1997/AnyKernel3 -b kona --depth 1 anykernel

          ###########################################################
          # MIUI/HyperOS Only 验证脚本
          ###########################################################
          cat > anykernel/anykernel.sh <<'EOF'
          anykernel3() {
          ui_print " "
          ui_print "= MIUI / HyperOS Only Kernel ="
          ui_print "  骁龙865 / SM8250 省电优化版"
          ui_print " "

          if grep -qE "missi-|qssi-|hyperos" /system/build.prop 2>/dev/null; then
            ui_print "✅ MIUI/HyperOS 检测通过"
          else
            ui_print "❌ 仅支持 MIUI / HyperOS!"
            ui_print "❌ 不可用于 AOSP/LineageOS 类ROM"
            exit 1
          fi

          if [ -f $home/kernels/Image ]; then
            mv $home/kernels/Image $home/Image
          fi
          if [ -f $home/kernels/dtb ]; then
            mv $home/kernels/dtb $home/dtb
          fi
          }
          EOF

          # 版本号修改
          lv="-perf"
          lv_new="-$(date +%Y%m%d)-${GIT_COMMIT_ID}-省电优化"
          sed -i "s|$lv|$lv_new|g" arch/arm64/configs/${DEVICE}_defconfig

          # DTS备份
          dts_source=arch/arm64/boot/dts/vendor/qcom
          cp -a "$dts_source" .dts.bak

          # 生成defconfig
          make $MAKE_ARGS ${DEVICE}_defconfig

          # SukiSU
          if [ $KSU_ENABLE -eq 1 ]; then
            curl -LSs "https://github.com/liyafe1997/SukiSU-Ultra/raw/4ff14cf0051d04209c4abd5027d99d8e7780ef5b/kernel/setup.sh" | bash -s f4863b20cc8dc0f8cc67418980f022e43014b598
            scripts/config --file out/.config \
              -e KSU -e KSU_MANUAL_HOOK -e KSU_SUSFS_HAS_MAGIC_MOUNT \
              -d KSU_SUSFS_SUS_PATH -e KSU_SUSFS_SUS_MOUNT \
              -e KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT \
              -e KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT \
              -e KSU_SUSFS_SUS_KSTAT -d KSU_SUSFS_SUS_OVERLAYFS \
              -e KSU_SUSFS_TRY_UMOUNT \
              -e KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT \
              -e KSU_SUSFS_SPOOF_UNAME -e KSU_SUSFS_ENABLE_LOG \
              -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS \
              -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG \
              -d KSU_SUSFS_OPEN_REDIRECT -d KSU_SUSFS_SU -e KPM
          else
            scripts/config --file out/.config -d KSU
          fi

          ###########################################################
          # 省电稳定优化
          ###########################################################
          scripts/config --file out/.config \
            --set-str STATIC_USERMODEHELPER_PATH /system/bin/micd \
            -e PERF_CRITICAL_RT_TASK -e SF_BINDER -e OVERLAY_FS \
            -d DEBUG_FS -d DEBUG_INFO -d PM_DEBUG -d FAULT_INJECTION \
            -d FTRACE -d DYNAMIC_FTRACE -d TRACING \
            -e MIGT -e MIGT_ENERGY_MODEL -e MIHW -e MILLET \
            -e XIAOMI_MIUI -e PERF_HUMANTASK \
            -e PACKAGE_RUNTIME_INFO -e BINDER_OPT \
            -d LTO_CLANG -d LOCALVERSION_AUTO \
            -e TASK_DELAY_ACCT -e MIUI_ZRAM_MEMORY_TRACKING \
            -e MI_FRAGMENTATION -e PERF_HELPER -e BOOTUP_RECLAIM -e MI_RECLAIM -e RTMM \
            -e CPU_IDLE_LPM \
            -e CPU_IDLE_GOV_LPMUNIVERSAL \
            -e CPU_FREQ_GOV_SCHEDUTIL \
            -e DEVFREQ_GOV_POWERSAVE \
            -e DEVFREQ_GOV_SIMPLE_ONDEMAND \
            -e F2FS_IDLE_FLUSH -e F2FS_FS_TRIM

          # 编译
          make $MAKE_ARGS -j$(nproc)

          # 合并dtb
          find out/arch/arm64/boot/dts -name '*.dtb' -exec cat {} + > out/arch/arm64/boot/dtb

          # 恢复DTS
          rm -rf "$dts_source"
          mv .dts.bak "$dts_source"

          # KSU patch
          if [ $KSU_ENABLE -eq 1 ]; then
            cd out/arch/arm64/boot
            wget -q https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/download/0.12.0/patch_linux
            chmod +x patch_linux
            ./patch_linux || true
            [ -f oImage ] && mv oImage Image
            cd -
          fi

          # 打包
          mkdir -p anykernel/kernels
          cp out/arch/arm64/boot/Image anykernel/kernels/
          cp out/arch/arm64/boot/dtb anykernel/kernels/

          cd anykernel
          ZIP_MIUI=Kernel_MIUI_${DEVICE}_${KSU_ZIP_STR}_省电版_${DATE}_${GIT_COMMIT_ID}.zip
          zip -r9 "$ZIP_MIUI" ./* -x ".git*" -x "*.zip"
          mv "$ZIP_MIUI" "$KERNEL_DIR"/
          cd ..

          # 恢复defconfig
          sed -i "s|$lv_new|$lv|g" arch/arm64/configs/${DEVICE}_defconfig

      - name: Upload MIUI Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-MIUI-${{ inputs.device }}-省电优化版
          path: ${{ env.KERNEL_DIR }}/Kernel_MIUI_*.zip
          retention-days: 15
