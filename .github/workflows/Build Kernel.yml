#!/bin/bash
# GitHub Actions 适配版 - 基于原 build.sh 完整保留逻辑
# 内核源码：https://github.com/AstideLabs/android_kernel_xiaomi_sm8250
set -e

# ========== GitHub Actions 环境适配 ==========
HOME="/home/runner"
WORKSPACE="/home/runner/work/android_kernel_xiaomi_sm8250/android_kernel_xiaomi_sm8250"
cd "${WORKSPACE}"

# 工具链路径（自动克隆）
TOOLCHAIN_PATH="${WORKSPACE}/zyc-clang/bin"
GIT_COMMIT_ID=$(git rev-parse --short=8 HEAD)
TARGET_DEVICE=$1

# 参数检查
if [ -z "$1" ]; then
    echo "Error: No argument provided, please specific a target device." 
    echo "If you need KernelSU, please add [ksu] as the second arg."
    echo "Examples:"
    echo "Build for lmi(K30 Pro/POCO F2 Pro) without KernelSU:"
    echo "    bash build.sh lmi"
    echo "Build for umi(Mi10) with KernelSU:"
    echo "    bash build.sh umi ksu"
    exit 1
fi

# ========== 自动安装依赖 ==========
echo "===== Installing build dependencies ====="
sudo apt-get update -yqq
sudo apt-get install -yqq bc bison build-essential ccache curl flex \
g++-multilib gcc-multilib git git-lfs gnupg gperf lib32ncurses5-dev \
lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev \
libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool \
squashfs-tools xsltproc zip zlib1g-dev python2 python3

# ========== 自动下载 Clang 工具链 ==========
echo "===== Preparing Clang toolchain ====="
if [ ! -d "${WORKSPACE}/zyc-clang" ]; then
    git clone https://github.com/zycdev/zyc-clang --depth=1 "${WORKSPACE}/zyc-clang"
fi

echo "TOOLCHAIN_PATH: [${TOOLCHAIN_PATH}]"
export PATH="${TOOLCHAIN_PATH}:${PATH}"

# 工具检查
if ! command -v aarch64-linux-gnu-ld >/dev/null 2>&1; then
    echo "[aarch64-linux-gnu-ld] not found"
    exit 1
fi
if ! command -v arm-linux-gnueabi-ld >/dev/null 2>&1; then
    echo "[arm-linux-gnueabi-ld] not found"
    exit 1
fi
if ! command -v clang >/dev/null 2>&1; then
    echo "[clang] not found"
    exit 1
fi

# ========== ccache 加速 ==========
export CCACHE_DIR="${HOME}/.cache/ccache_mikernel"
export CC="ccache gcc"
export CXX="ccache g++"
export PATH="/usr/lib/ccache:${PATH}"
echo "CCACHE_DIR: [${CCACHE_DIR}]"

# ========== 编译参数 ==========
MAKE_ARGS="ARCH=arm64 SUBARCH=arm64 O=out CC=clang \
CROSS_COMPILE=aarch64-linux-gnu- \
CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
CLANG_TRIPLE=aarch64-linux-gnu-"

if [ "$1" = "j1" ]; then
    make ${MAKE_ARGS} -j1
    exit
fi
if [ "$1" = "continue" ]; then
    make ${MAKE_ARGS} -j$(nproc)
    exit
fi

if [ ! -f "arch/arm64/configs/${TARGET_DEVICE}_defconfig" ]; then
    echo "No defconfig for [${TARGET_DEVICE}]"
    ls arch/arm64/configs/*_defconfig
    exit 1
fi

# Clang 版本
echo -e "\n===== Clang Version ====="
clang --version

# ========== KernelSU 开关 ==========
KSU_ZIP_STR=NoKernelSU
if [ "$2" = "ksu" ]; then
    KSU_ENABLE=1
    KSU_ZIP_STR=ReSukiSU-SuSFS
else
    KSU_ENABLE=0
fi

echo "TARGET_DEVICE: ${TARGET_DEVICE}"
if [ ${KSU_ENABLE} -eq 1 ]; then
    echo "KSU enabled"
    curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
else
    echo "KSU disabled"
fi

# ========== 清理环境 ==========
echo -e "\n===== Cleaning ====="
rm -rf out/ anykernel/

# 克隆 AnyKernel3
git clone https://github.com/AstideLabs/AnyKernel3 \
-b master --single-branch --depth=1 anykernel

# ========== MIUI 编译（原逻辑完整保留）==========
echo -e "\n===== Building for MIUI ====="
dts_source=arch/arm64/boot/dts/vendor/qcom
cp -a "${dts_source}" .dts.bak

# 屏幕参数（修复语法，兼容所有设备）
sed -i 's/<154>/<1537>/g' ${dts_source}/dsi-panel-j1s* 2>/dev/null || :
sed -i 's/<154>/<1537>/g' ${dts_source}/dsi-panel-j2* 2>/dev/null || :
sed -i 's/<155>/<1544>/g' ${dts_source}/dsi-panel-j3s-37-02-0a-dsc-video.dtsi 2>/dev/null || :
sed -i 's/<155>/<1545>/g' ${dts_source}/dsi-panel-j11-38-08-0a-fhd-cmd.dtsi 2>/dev/null || :
sed -i 's/<155>/<1546>/g' ${dts_source}/dsi-panel-k11a-38-08-0a-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/<155>/<1546>/g' ${dts_source}/dsi-panel-l11r-38-08-0a-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/<70>/<695>/g' ${dts_source}/dsi-panel-j11-38-08-0a-fhd-cmd.dtsi 2>/dev/null || :
sed -i 's/<70>/<695>/g' ${dts_source}/dsi-panel-j3s-37-02-0a-dsc-video.dtsi 2>/dev/null || :
sed -i 's/<70>/<695>/g' ${dts_source}/dsi-panel-k11a-38-08-0a-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/<70>/<695>/g' ${dts_source}/dsi-panel-l11r-38-08-0a-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/<71>/<710>/g' ${dts_source}/dsi-panel-j1s* 2>/dev/null || :
sed -i 's/<71>/<710>/g' ${dts_source}/dsi-panel-j2* 2>/dev/null || :

# 智能帧率
sed -i 's/\/\/ mi,mdss-dsi-pan-enable-smart-fps/mi,mdss-dsi-pan-enable-smart-fps/g' ${dts_source}/dsi-panel* 2>/dev/null || :
sed -i 's/\/\/ mi,mdss-dsi-smart-fps-max_framerate/mi,mdss-dsi-smart-fps-max_framerate/g' ${dts_source}/dsi-panel* 2>/dev/null || :
sed -i 's/\/\/ qcom,mdss-dsi-pan-enable-smart-fps/qcom,mdss-dsi-pan-enable-smart-fps/g' ${dts_source}/dsi-panel* 2>/dev/null || :
sed -i 's/qcom,mdss-dsi-qsync-min-refresh-rate/\/\/qcom,mdss-dsi-qsync-min-refresh-rate/g' ${dts_source}/dsi-panel* 2>/dev/null || :

# 刷新率
sed -i 's/120 90 60/120 90 60 50 30/g' ${dts_source}/dsi-panel-g7a-36-02-0c-dsc-video.dtsi 2>/dev/null || :
sed -i 's/120 90 60/120 90 60 50 30/g' ${dts_source}/dsi-panel-g7a-37-02-0a-dsc-video.dtsi 2>/dev/null || :
sed -i 's/120 90 60/120 90 60 50 30/g' ${dts_source}/dsi-panel-g7a-37-02-0b-dsc-video.dtsi 2>/dev/null || :
sed -i 's/144 120 90 60/144 120 90 60 50 48 30/g' ${dts_source}/dsi-panel-j3s-37-02-0a-dsc-video.dtsi 2>/dev/null || :

# 亮度配置
sed -i 's/\/\/39 00 00 00 00 00 03 51 03 FF/39 00 00 00 00 00 03 51 03 FF/g' ${dts_source}/dsi-panel-j9-38-0a-0a-fhd-video.dtsi 2>/dev/null || :
sed -i 's/\/\/39 00 00 00 00 00 03 51 0D FF/39 00 00 00 00 00 03 51 0D FF/g' ${dts_source}/dsi-panel-j2-p2-1-38-0c-0a-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 00 00 00 00 00 05 51 0F 8F 00 00/39 00 00 00 00 00 05 51 0F 8F 00 00/g' ${dts_source}/dsi-panel-j1s-42-02-0a-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 00 00 00 00 00 05 51 0F 8F 00 00/39 00 00 00 00 00 05 51 0F 8F 00 00/g' ${dts_source}/dsi-panel-j1s-42-02-0a-mp-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 00 00 00 00 00 05 51 0F 8F 00 00/39 00 00 00 00 00 05 51 0F 8F 00 00/g' ${dts_source}/dsi-panel-j2-mp-42-02-0b-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 00 00 00 00 00 05 51 0F 8F 00 00/39 00 00 00 00 00 05 51 0F 8F 00 00/g' ${dts_source}/dsi-panel-j2-p2-1-42-02-0b-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 00 00 00 00 00 05 51 0F 8F 00 00/39 00 00 00 00 00 05 51 0F 8F 00 00/g' ${dts_source}/dsi-panel-j2s-mp-42-02-0a-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 01 00 00 00 00 03 51 00 00/39 01 00 00 00 00 03 51 00 00/g' ${dts_source}/dsi-panel-j2-38-0c-0a-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 01 00 00 00 00 03 51 03 FF/39 01 00 00 00 00 03 51 03 FF/g' ${dts_source}/dsi-panel-j11-38-08-0a-fhd-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 01 00 00 00 00 03 51 07 FF/39 01 00 00 00 00 03 51 07 FF/g' ${dts_source}/dsi-panel-j1u-42-02-0b-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 01 00 00 00 00 03 51 0F FF/39 01 00 00 00 00 03 51 0F FF/g' ${dts_source}/dsi-panel-j1u-42-02-0b-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 01 00 00 00 00 05 51 07 FF 00 00/39 01 00 00 00 00 05 51 07 FF 00 00/g' ${dts_source}/dsi-panel-j1s-42-02-0a-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 01 00 00 00 00 05 51 07 FF 00 00/39 01 00 00 00 00 05 51 07 FF 00 00/g' ${dts_source}/dsi-panel-j1s-42-02-0a-mp-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 01 00 00 00 00 05 51 07 FF 00 00/39 01 00 00 00 00 05 51 07 FF 00 00/g' ${dts_source}/dsi-panel-j2-mp-42-02-0b-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 01 00 00 00 00 05 51 07 FF 00 00/39 01 00 00 00 00 05 51 07 FF 00 00/g' ${dts_source}/dsi-panel-j2-p2-1-42-02-0b-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 01 00 00 00 00 05 51 07 FF 00 00/39 01 00 00 00 00 05 51 07 FF 00 00/g' ${dts_source}/dsi-panel-j2s-mp-42-02-0a-dsc-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 01 00 00 01 00 03 51 03 FF/39 01 00 00 01 00 03 51 03 FF/g' ${dts_source}/dsi-panel-j11-38-08-0a-fhd-cmd.dtsi 2>/dev/null || :
sed -i 's/\/\/39 01 00 00 11 00 03 51 03 FF/39 01 00 00 11 00 03 51 03 FF/g' ${dts_source}/dsi-panel-j2-p2-1-38-0c-0a-dsc-cmd.dtsi 2>/dev/null || :

# ========== 生成配置 & 编译 ==========
make ${MAKE_ARGS} ${TARGET_DEVICE}_defconfig

# KSU 配置
if [ ${KSU_ENABLE} -eq 1 ]; then
    scripts/config --file out/.config \
    -e KSU \
    -e THREAD_INFO_IN_TASK \
    -e KSU_SUSFS \
    -e KSU_SUSFS_SUS_PATH \
    -e KSU_SUSFS_SUS_MOUNT \
    -e KSU_SUSFS_SUS_KSTAT \
    -e KSU_SUSFS_SPOOF_UNAME \
    -e KSU_SUSFS_ENABLE_LOG \
    -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS \
    -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG \
    -e KSU_SUSFS_OPEN_REDIRECT \
    -e KSU_SUSFS_SUS_MAP \
    -e KSU_MULTI_MANAGER_SUPPORT \
    -e KPM
else
    scripts/config --file out/.config -d KSU
fi

# 内核功能配置
scripts/config --file out/.config \
--set-str STATIC_USERMODEHELPER_PATH /system/bin/micd \
-e PERF_CRITICAL_RT_TASK \
-e SF_BINDER \
-e OVERLAY_FS \
-d DEBUG_FS \
-e MIGT \
-e MIGT_ENERGY_MODEL \
-e MIHW \
-e PACKAGE_RUNTIME_INFO \
-e BINDER_OPT \
-e KPERFEVENTS \
-e MILLET \
-e PERF_HUMANTASK \
-d LTO_CLANG \
-e XIAOMI_MIUI \
-d MI_MEMORY_SYSFS \
-e TASK_DELAY_ACCT \
-e MIUI_ZRAM_MEMORY_TRACKING \
-d CONFIG_MODULE_SIG_SHA512 \
-d CONFIG_MODULE_SIG_HASH \
-e MI_FRAGMENTION \
-e PERF_HELPER \
-e BOOTUP_RECLAIM \
-e MI_RECLAIM \
-e RTMM

# 编译
make ${MAKE_ARGS} -j$(nproc)

# 检查结果
if [ -f "out/arch/arm64/boot/Image" ]; then
    echo -e "\n✅ MIUI kernel build success"
else
    echo -e "\n❌ Build failed"
    exit 1
fi

# 生成 dtb
echo "Generating dtb..."
find out/arch/arm64/boot/dts -name '*.dtb' -exec cat {} + > out/arch/arm64/boot/dtb

# 恢复 dts
rm -rf "${dts_source}"
mv .dts.bak "${dts_source}"

# ========== 打包 ==========
mkdir -p anykernel/kernels/miui/

# KSU 补丁
if [ ${KSU_ENABLE} -eq 1 ]; then
    cd out/arch/arm64/boot/
    wget -q https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/download/0.13.0/patch_linux
    chmod +x patch_linux
    ./patch_linux
    rm -f Image
    mv oImage Image
    cd -
fi

# 复制文件
cp out/arch/arm64/boot/Image anykernel/kernels/miui/
cp out/arch/arm64/boot/dtb anykernel/kernels/miui/
cp out/arch/arm64/boot/dtbo.img anykernel/kernels/miui/ 2>/dev/null || :

# 打包 ZIP
cd anykernel
ZIP_FILENAME=APTKernel_MIUI_${TARGET_DEVICE}_${KSU_ZIP_STR}_$(date +'%Y%m%d_%H%M%S')_anykernel3_${GIT_COMMIT_ID}.zip
zip -r9 "${ZIP_FILENAME}" ./* -x ".git/*" ".gitignore" "out/*" "*.zip"
mv "${ZIP_FILENAME}" ../
cd ..

# 输出到发布目录
mkdir -p release
mv "${ZIP_FILENAME}" release/

echo -e "\n✅ Done! Flashable zip: release/${ZIP_FILENAME}"

- name: Upload kernel zip
         uses: actions/upload-artifact@v4
         with:
           name: kernel-${{ github.event.inputs.device }}
           path: release/*.zip
