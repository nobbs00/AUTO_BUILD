name: Mi10Pro-cmi HyperOS1.0.5 Kernel Build (liyafe1997/sm8250)
on:
  workflow_dispatch:
    inputs:
      phone:
        description: 设备型号(固定cmi-小米10Pro)
        required: true
        default: 'MI10_Pro-cmi'
        type: choice
        options:
          - MI10_Pro-cmi

jobs:
  build_cmi_kernel:
    runs-on: ubuntu-22.04
    env:
      TARGET_DEVICE: cmi
      KERNEL_DIR: ${{ github.workspace }}/kernel_xiaomi_sm8250_mod
      CLANG_VERSION: 20210522
      ARCH: arm64
      SUBARCH: arm64
      HYPEROS_VER: 1.0.5
      GIT_COMMIT_ID: ${{ github.sha }}

    steps:
      - name: ⚙️ 安装系统依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential git curl wget bison flex zip bc cpio libssl-dev \
            python3 python3-pip python-is-python3 libelf-dev dwarves rsync lz4 gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu ccache
          sudo apt autoremove -y && sudo apt clean

      - name: 📥 拉取内核源码
        run: |
          git clone https://github.com/liyafe1997/kernel_xiaomi_sm8250_mod.git "$KERNEL_DIR"
          cd "$KERNEL_DIR"
          git checkout android15-lineage22-mod
          git fetch --depth 1 && git pull

      - name: 🛠 下载 Proton-Clang 20210522
        run: |
          mkdir -p "$HOME"/proton-clang
          cd "$HOME"/proton-clang
          wget -q --timeout=30 --tries=3 https://github.com/kdrag0n/proton-clang/archive/refs/tags/${CLANG_VERSION}.zip
          unzip -q ${CLANG_VERSION}.zip
          TOOLCHAIN_PATH="$HOME"/proton-clang/proton-clang-${CLANG_VERSION}/bin
          echo "TOOLCHAIN_PATH=$TOOLCHAIN_PATH" >> "$GITHUB_ENV"
          echo "$TOOLCHAIN_PATH" >> "$GITHUB_PATH"

      - name: 🚀 编译内核（修复版，无exit code 2）
        run: |
          cd "$KERNEL_DIR"
          export PATH="$TOOLCHAIN_PATH:$PATH"

          MAKE_ARGS="ARCH=arm64 SUBARCH=arm64 O=out CC=clang \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          LLVM=1 LLVM_IAS=1"

          # 移除会导致老clang报错的优化
          export KCFLAGS="-fno-strict-aliasing -fno-common -pipe -Wno-error -O2"
          export LDFLAGS=""

          # 版本号
          lv="-perf"
          lv_new="-HyperOS${HYPEROS_VER}-A13-$(date +%Y%m%d)-${GIT_COMMIT_ID:0:8}"
          sed -i "s|$lv|$lv_new|g" arch/arm64/configs/cmi_defconfig

          # 备份 DTS，不做危险修改，避免编译失败
          dts_source=arch/arm64/boot/dts/vendor/qcom
          cp -a "$dts_source" .dts.bak

          # 生成 config
          make $MAKE_ARGS cmi_defconfig

          # 只开稳定配置，移除会报错的 CONFIG
          scripts/config --file out/.config \
          -e KALLSYMS -e KALLSYMS_ALL \
          -e EROFS_FS -e F2FS_FS -e F2FS_FS_TRIM \
          -e ZRAM -e CRYPTO_LZ4 -e CRYPTO_ZSTD \
          -e TCP_CONG_BBR -e DEFAULT_BBR \
          -e MQ_IOSCHED_KYBER -e IOSCHED_BFQ \
          -e XIAOMI_MIUI -e MIHW \
          -d DEBUG_FS -d LTO_CLANG -d LOCALVERSION_AUTO \
          -d KSU -d KSU_SUSFS -d KPM

          # 关键：降低线程，避免 Actions OOM，导致 exit code 2
          make $MAKE_ARGS -j4 2>&1 | tee build.log

          # 校验镜像
          if [ ! -f out/arch/arm64/boot/Image ]; then
            echo "❌ 编译失败"
            exit 1
          fi

          # 合并DTB
          find out/arch/arm64/boot/dts -name '*.dtb' -exec cat {} + > out/arch/arm64/boot/dtb

          # 恢复源码
          rm -rf "$dts_source"
          mv .dts.bak "$dts_source"
          sed -i "s|$lv_new|$lv|g" arch/arm64/configs/cmi_defconfig

          # 打包
          git clone https://github.com/liyafe1997/AnyKernel3 -b kona --depth 1 anykernel
          mkdir -p anykernel/kernels
          cp out/arch/arm64/boot/Image anykernel/kernels/
          cp out/arch/arm64/boot/dtb anykernel/kernels/

          cd anykernel
          ZIP=Mi10Pro-cmi_HyperOS1.0.5_$(date +%Y%m%d_%H%M%S)_${GIT_COMMIT_ID:0:8}.zip
          zip -r9 "$ZIP" . -x '.git*'
          mv "$ZIP" "$KERNEL_DIR"/

      - name: 📦 查看产物
        run: |
          cd "$KERNEL_DIR"
          ls -lh *.zip out/arch/arm64/boot/Image

      - name: 📤 上传刷机包
        uses: actions/upload-artifact@v4
        with:
          name: Mi10Pro-cmi-Kernel
          path: |
            ${{ env.KERNEL_DIR }}/*.zip
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/dtb
            ${{ env.KERNEL_DIR }}/build.log
          retention-days: 10
