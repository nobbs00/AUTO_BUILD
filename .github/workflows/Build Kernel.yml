name: Build MIUI Kernel

on:
  workflow_dispatch:
    inputs:
      device:
        description: "设备代号（如 lmi / umi）"
        required: true
        default: "lmi"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 安装完整依赖（修复所有缺失库）
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang lld llvm git zip zip unzip \
            aarch64-linux-gnu-gcc arm-linux-gnueabi-gcc gcc-multilib \
            ccache bison flex libssl-dev libelf-dev bc cpio libtinfo5 \
            make python3 python3-pip

      # 初始化 ccache（加快编译）
      - name: Setup ccache
        run: |
          ccache -M 10G
          ccache -z

      - name: Build MIUI Kernel
        run: |
          set -e

          TARGET_DEVICE="${{ github.event.inputs.device }}"
          GIT_COMMIT_ID=$(git rev-parse --short=8 HEAD)
          DATE=$(date +'%Y%m%d_%H%M%S')

          MAKE_ARGS="ARCH=arm64 SUBARCH=arm64 O=out \
          CC=clang \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
          CLANG_TRIPLE=aarch64-linux-gnu-"

          # 检查 defconfig
          if [ ! -f "arch/arm64/configs/${TARGET_DEVICE}_defconfig" ]; then
            echo "Device not found: $TARGET_DEVICE"
            ls arch/arm64/configs/*_defconfig
            exit 1
          fi

          # 清理
          rm -rf out anykernel
          rm -f .dts.bak

          # 克隆 AnyKernel3（使用镜像加速）
          git clone https://ghproxy.net/https://github.com/liyafe1997/AnyKernel3 -b kona --depth=1 anykernel

          # 修改版本号
          local_version_str="-perf"
          local_version_date_str="-$(date +%Y%m%d)-${GIT_COMMIT_ID}-perf"
          sed -i.bak "s/${local_version_str}/${local_version_date_str}/g" arch/arm64/configs/${TARGET_DEVICE}_defconfig

          # ==================== MIUI 编译 ====================
          echo -e "\n===== Building MIUI Kernel ====="

          dts_source=arch/arm64/boot/dts/vendor/qcom
          if [ -d "$dts_source" ]; then
            cp -a "$dts_source" .dts.bak

            # 只对存在的文件执行sed，避免报错
            find "$dts_source" -name 'dsi-panel-*.dtsi' -o -name 'dsi-panel-*.dts' | while read -r f; do
              sed -i 's/<154>/<1537>/g' "$f"
              sed -i 's/<155>/<1544>/g' "$f"
              sed -i 's/<155>/<1545>/g' "$f"
              sed -i 's/<155>/<1546>/g' "$f"
              sed -i 's/<70>/<695>/g' "$f"
              sed -i 's/<71>/<710>/g' "$f"

              sed -i 's/\/\/ mi,mdss-dsi-pan-enable-smart-fps/mi,mdss-dsi-pan-enable-smart-fps/g' "$f"
              sed -i 's/\/\/ mi,mdss-dsi-smart-fps-max_framerate/mi,mdss-dsi-smart-fps-max_framerate/g' "$f"
              sed -i 's/\/\/ qcom,mdss-dsi-pan-enable-smart-fps/qcom,mdss-dsi-pan-enable-smart-fps/g' "$f"
              sed -i 's/qcom,mdss-dsi-qsync-min-refresh-rate/\/\/qcom,mdss-dsi-qsync-min-refresh-rate/g' "$f"

              sed -i 's/120 90 60/120 90 60 50 30/g' "$f"
              sed -i 's/144 120 90 60/144 120 90 60 50 48 30/g' "$f"

              sed -i 's/\/\/39 00 00 00 00 00 03 51/39 00 00 00 00 00 03 51/g' "$f"
              sed -i 's/\/\/39 01 00 00 00 00 03 51/39 01 00 00 00 00 03 51/g' "$f"
              sed -i 's/\/\/39 00 00 00 00 00 05 51/39 00 00 00 00 00 05 51/g' "$f"
              sed -i 's/\/\/39 01 00 00 00 00 05 51/39 01 00 00 00 00 05 51/g' "$f"
            done
          fi

          # 生成 defconfig
          make $MAKE_ARGS ${TARGET_DEVICE}_defconfig

          # 内核配置（如果scripts/config不存在则跳过，防止炸编译）
          if [ -x scripts/config ]; then
            scripts/config --file out/.config \
              --set-str STATIC_USERMODEHELPER_PATH /system/bin/micd \
              -e PERF_CRITICAL_RT_TASK \
              -e SF_BINDER \
              -e OVERLAY_FS \
              -d DEBUG_FS \
              -e MIGT \
              -e MIGT_ENERGY_MODEL \
              -e MIHW \
              -e PACKAGE_RUNTIME_INFO \
              -e BINDER_OPT \
              -e KPERFEVENTS \
              -e MILLET \
              -e PERF_HUMANTASK \
              -d LTO_CLANG \
              -d LOCALVERSION_AUTO \
              -e XIAOMI_MIUI \
              -d MI_MEMORY_SYSFS \
              -e TASK_DELAY_ACCT \
              -e MIUI_ZRAM_MEMORY_TRACKING \
              -d CONFIG_MODULE_SIG_SHA512 \
              -d CONFIG_MODULE_SIG_HASH \
              -e MI_FRAGMENTION \
              -e PERF_HELPER \
              -e BOOTUP_RECLAIM \
              -e MI_RECLAIM \
              -e RTMM
          fi

          # 开始编译（使用 runner 最大线程）
          make $MAKE_ARGS -j$(nproc)

          # 校验镜像
          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "MIUI build failed!"
            exit 1
          fi

          # 稳定生成 dtb
          rm -f out/arch/arm64/boot/dtb
          find out/arch/arm64/boot/dts -name '*.dtb' -exec cat {} + > out/arch/arm64/boot/dtb

          # 恢复 dts
          if [ -d .dts.bak ]; then
            rm -rf "$dts_source"
            mv .dts.bak "$dts_source"
          fi

          # 打包
          mkdir -p anykernel/kernels
          cp out/arch/arm64/boot/Image anykernel/kernels/
          cp out/arch/arm64/boot/dtb anykernel/kernels/

          cd anykernel
          ZIP_NAME=Kernel_MIUI_${TARGET_DEVICE}_NoKSU_${DATE}_${GIT_COMMIT_ID}.zip
          zip -r9 "$ZIP_NAME" ./* -x .git .gitignore "*.zip"
          mv "$ZIP_NAME" ../
          cd ..

          # 恢复 defconfig
          mv arch/arm64/configs/${TARGET_DEVICE}_defconfig.bak arch/arm64/configs/${TARGET_DEVICE}_defconfig

          echo -e "\nBuild success!"
          ls -lah *.zip

      - name: Upload MIUI Kernel
        uses: actions/upload-artifact@v4
        with:
          name: MIUI-Kernel-${{ github.event.inputs.device }}
          path: "*.zip"
